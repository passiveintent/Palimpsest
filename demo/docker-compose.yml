# Palimpsest demo. Default `docker compose up` runs the reliable, fully
# offline core story: plsim (synthetic workload) -> shared frames volume ->
# palimpsestd (reconstructor + audit) -> anomalies/series/audit_report
# JSON, with Prometheus + Grafana for the Layer-1 exact-value dashboard.
#
# An optional `otel` profile (`docker compose --profile otel up`) adds a
# real ocb-built OTel Collector running the csresidual processor against
# real host metrics, in shadow mode, as a secondary demonstration of the
# genuine ingestion path — see demo/README.md. It is not required for, and
# does not affect, the default path's acceptance story.
#
# No cloud credentials anywhere here: every image is either built from
# this repo or is an official upstream image (prometheus, grafana), and
# every service talks only to the other services on this compose network.

services:
  palimpsestd:
    build:
      context: ..
      dockerfile: demo/palimpsestd.Dockerfile
    environment:
      - PALIMPSEST_TENANT_KEY=${PALIMPSEST_TENANT_KEY:-demo-tenant-key-change-me-in-prod}
    volumes:
      - ./frames:/data/frames
      - ./out:/data/out
      - ./truth:/data/truth
    command: >
      --frames-dir=/data/frames
      --frames-poll-interval=1s
      --out-dir=/data/out
      --truth=/data/truth/truth.jsonl
      --audit-interval=10s
      --remote-write-url=http://prometheus:9090/api/v1/write
      --emitters-expected=${PLSIM_EMITTERS:-1}
      --repair-horizon=10m
    depends_on:
      - prometheus
    restart: unless-stopped

  plsim:
    build:
      context: ..
      dockerfile: demo/plsim.Dockerfile
    environment:
      - PALIMPSEST_TENANT_KEY=${PALIMPSEST_TENANT_KEY:-demo-tenant-key-change-me-in-prod}
    volumes:
      - ./frames:/data/frames
      - ./truth:/data/truth
    command: >
      --frames-out=/data/frames
      --truth-out=/data/truth/truth.jsonl
      --tenant-key=${PALIMPSEST_TENANT_KEY:-demo-tenant-key-change-me-in-prod}
      --interval=${PLSIM_INTERVAL:-10s}
      --windows=${PLSIM_WINDOWS:-60}
      --churn-rate=${PLSIM_CHURN_RATE:-30}
      --drift-rate=${PLSIM_DRIFT_RATE:-10}
      --hot-instance=${PLSIM_HOT_INSTANCE:-3}
      --emitters=${PLSIM_EMITTERS:-1}
      --partition=${PLSIM_PARTITION:-0s}
      --duplicate-rate=${PLSIM_DUPLICATE_RATE:-0}
    depends_on:
      - palimpsestd

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana-dashboard.json:/etc/grafana/dashboards/grafana-dashboard.json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  otel-collector:
    profiles: ["otel"]
    build:
      context: ..
      dockerfile: demo/otelcol.Dockerfile
    environment:
      - PALIMPSEST_TENANT_KEY=${PALIMPSEST_TENANT_KEY:-demo-tenant-key-change-me-in-prod}
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol/config.yaml:ro
      - ./frames:/data/frames
    command: ["--config=/etc/otelcol/config.yaml"]
