name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: |
            go.sum
            otel/go.sum

      - name: go vet (root module)
        run: go vet ./...

      - name: deps-check (pkg/* stays stdlib+xxhash, ADR-007)
        run: make deps-check

      - name: go vet (otel module)
        working-directory: otel
        run: go vet ./...

      - name: go test -race (root module)
        run: go test -race ./...

      - name: go test -race (otel module)
        working-directory: otel
        run: go test -race ./...

      - name: benchmark regression smoke (pkg/recover)
        # Non-race: -race's instrumentation overhead (5-20x) would make
        # this wall-clock comparison meaningless. See
        # pkg/recover/bench_regression_test.go and testdata/bench_baseline.txt.
        run: go test -run TestBenchmarkRecoverRegression -v ./pkg/recover/...
