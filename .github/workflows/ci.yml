name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: |
            go.sum
            otel/go.sum

      - name: go vet (root module)
        run: go vet ./...

      - name: go vet (otel module)
        working-directory: otel
        run: go vet ./...

      - name: go test -race (root module)
        run: go test -race ./...

      - name: go test -race (otel module)
        working-directory: otel
        run: go test -race ./...
